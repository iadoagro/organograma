*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;background:#f3f5f0;color:var(--ink)}
.topbar{height:54px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;background:linear-gradient(135deg,var(--verde),var(--verde2));border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.topbar__title{display:grid;line-height:1;text-transform:uppercase;white-space:nowrap}
.topbar__title span{font-size:11px;letter-spacing:.5px;color:rgba(255,255,255,0.85)}
.topbar__title strong{color:#fff;font-size:24px}
.toolbar{display:flex;align-items:center;gap:6px}
.tool-button,.icon-button{border:1px solid #b7c0c8;background:#fff;color:#1f2933;cursor:pointer;border-radius:var(--radius);min-height:32px;transition:background .16s,transform .16s}
.tool-button{display:inline-flex;align-items:center;gap:5px;padding:0 10px;font-size:12px;font-weight:700}
.icon-button{width:32px;padding:0;font-size:16px;font-weight:700;text-align:center}
.tool-button:hover,.icon-button:hover{background:#edf2f7}
.tool-button:active,.icon-button:active{transform:translateY(1px)}
.zoom-range{width:100px;accent-color:#229142}
.nav-row{display:flex;align-items:center;gap:10px;padding:6px 16px;background:#f9fafb;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;font-size:11px;flex-wrap:wrap}
.legend{display:flex;gap:8px;align-items:center;white-space:nowrap}
.legend span{display:inline-flex;align-items:center;gap:4px}
.swatch{display:inline-block;width:10px;height:10px;border:1px solid #111827}
.nav-row a.voltar{padding:4px 10px;border-radius:var(--radius);font-weight:600;font-size:11px;color:var(--verde);background:#fff;border:1px solid var(--verde2);text-decoration:none;transition:all .2s}
.nav-row a.voltar:hover{background:#e8f5e9}
.zoom-label{font-size:11px;font-weight:700;color:#667085;min-width:36px;text-align:center}
.viewport{flex:1;position:relative;overflow:hidden;cursor:grab;background:linear-gradient(rgba(255,255,255,.72),rgba(255,255,255,.72)),repeating-linear-gradient(0deg,transparent 0,transparent 39px,rgba(46,74,91,.05) 40px),repeating-linear-gradient(90deg,transparent 0,transparent 39px,rgba(46,74,91,.05) 40px)}
.viewport.dragging{cursor:grabbing}
.canvas{position:absolute;top:0;left:0;transform-origin:0 0;width:2400px;height:1350px;background:#fff;box-shadow:0 12px 30px rgba(31,41,51,.12);overflow:hidden}
.canvas::before{content:"AC";position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);font-size:390px;font-weight:800;color:rgba(112,173,71,.05);pointer-events:none}
.line-layer{position:absolute;inset:0;width:2400px;height:1350px;overflow:visible;z-index:1}
.line-layer path{fill:none;stroke:var(--line);stroke-width:2.1;stroke-linecap:square;stroke-linejoin:miter;opacity:.9}
.org-node{position:absolute;z-index:2;border:1.4px solid #111827;background:#fff;color:#111827;cursor:pointer;overflow:hidden;box-shadow:0 2px 4px rgba(17,24,39,.08);transition:opacity .16s,filter .16s,transform .16s;padding:0;font:inherit;text-align:left}
.org-node:hover{transform:translateY(-1px);z-index:5;box-shadow:0 8px 20px rgba(17,24,39,.18)}
.org-node.hidden{display:none}
.org-node.dimmed{opacity:.32;filter:grayscale(.55)}
.node-header{position:relative;display:grid;place-items:center;height:var(--hh);padding:2px 7px;color:#111827;text-align:center;font-size:9px;font-weight:700;line-height:1.08;border-bottom:1.4px solid #111827}
.node-body{display:grid;place-items:center;height:var(--bh);padding:2px 7px;background:#fff;color:#111827;text-align:center;white-space:pre-line;font-size:8px;line-height:1.12}
.node-toggle{position:absolute;right:3px;top:3px;display:grid;place-items:center;width:11px;height:11px;background:rgba(255,255,255,.86);border:1px solid rgba(17,24,39,.72);border-radius:50%;color:#111827;font-size:8px;font-weight:700;line-height:1}
.org-node[data-color="purple"] .node-header{background:var(--purple);color:#fff}
.org-node[data-color="yellow"] .node-header{background:var(--yellow)}
.org-node[data-color="blue"] .node-header{background:var(--blue);color:#fff}
.org-node[data-color="green"] .node-header{background:var(--green)}
.org-node[data-color="orange"] .node-header{background:var(--orange)}
.org-node[data-kind="secretaria"] .node-header{font-size:10px;text-transform:uppercase}
.org-node[data-kind="diretoria"] .node-header,.org-node[data-kind="departamento"] .node-header{font-size:8px}
.org-node[data-kind="divisao"] .node-header,.org-node[data-kind="nucleo"] .node-header{padding:2px 3px;font-size:6.4px}
.org-node[data-kind="divisao"] .node-body,.org-node[data-kind="nucleo"] .node-body{padding:2px 3px;font-size:6.5px}
.org-node[data-kind="escritorio"] .node-header,.org-node[data-kind="escritorio"] .node-body{font-size:7px}
.org-node[data-long="true"] .node-header{font-size:5.7px;line-height:1.02}
.slide-brand{position:absolute;top:38px;right:88px;z-index:0;width:500px;text-align:center;text-transform:uppercase;line-height:.95;color:#222;pointer-events:none;display:grid}
.slide-brand span{font-size:26px;letter-spacing:.4px}
.slide-brand strong{color:#239044;font-size:54px}
.source-note{position:absolute;right:104px;bottom:36px;color:rgba(31,41,51,.48);font-size:16px;font-weight:700;z-index:0}
.tooltip{position:fixed;z-index:50;max-width:300px;padding:10px 12px;border:1px solid #111827;border-radius:var(--radius);background:#fff;box-shadow:0 12px 30px rgba(17,24,39,.22);color:#111827;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s;font-size:12px}
.tooltip.show{opacity:1;transform:translateY(0)}
.tooltip strong{display:block;margin-bottom:4px}
.tooltip span{display:block;color:#4b5563;white-space:pre-line}
@media(max-width:700px){.topbar{height:auto;flex-direction:column;padding:8px}.toolbar{flex-wrap:wrap}.nav-row{padding:4px 8px}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1f2933;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:60;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.org-node[data-has-pdf="true"]{cursor:pointer}
.org-node[data-has-pdf="true"]:hover .node-header::after{content:" ↓";font-size:7px;opacity:.7}
</style>
</head>

const nodes=RAW.map(d=>({id:d[0],parent:d[1],kind:d[2],color:d[3],title:d[4],holder:d[5],x:d[6],y:d[7],w:d[8],hh:d[9],bh:d[10]||d[9],children:[]}));
const byId=new Map(nodes.map(n=>[n.id,n]));
nodes.forEach(n=>{if(n.parent&&byId.has(n.parent))byId.get(n.parent).children.push(n.id)});

const collapsed=new Set();
const rendered=new Map();
const canvas=document.getElementById("canvas");
const lineLayer=document.getElementById("lineLayer");
const viewport=document.getElementById("viewport");
const tooltip=document.getElementById("tooltip");
const zoomRange=document.getElementById("zoomRange");
const zoomLabel=document.getElementById("zoomLabel");

function rectFor(n){
  const x=xPx(n.x),y=yPx(n.y),w=xPx(n.w),hh=yPx(n.hh),bh=yPx(n.bh);
  return{x,y,w,hh,bh,h:hh+bh,cx:x+w/2,top:y,bottom:y+hh+bh};
}

function hasCollapsedAncestor(n){
  let p=n.parent;
  while(p){if(collapsed.has(p))return true;p=byId.get(p)?.parent}
  return false;
}
function isVisible(n){return!hasCollapsedAncestor(n)}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function createNode(n){
  const r=rectFor(n);
  const el=document.createElement("button");
  el.type="button";el.className="org-node";
  el.dataset.id=n.id;el.dataset.kind=n.kind;el.dataset.color=n.color;
  el.dataset.long=String(n.title.length>42);
  el.style.cssText=`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;--hh:${r.hh}px;--bh:${r.bh}px`;
  const hdr=document.createElement("div");hdr.className="node-header";hdr.textContent=n.title;
  if(n.children.length>0){const tg=document.createElement("span");tg.className="node-toggle";tg.textContent="−";hdr.appendChild(tg)}
  const body=document.createElement("div");body.className="node-body";body.textContent=n.holder||"—";
  el.append(hdr,body);
  const pdfPath=getPDFPath(n.holder);
  if(pdfPath)el.dataset.hasPdf="true";
  el.addEventListener("click",e=>{
    if(e.target.closest(".node-toggle")){e.stopPropagation();toggleNode(n);return}
    e.stopPropagation();
    if(pdfPath){downloadLink(pdfPath,pdfPath.split("/").pop())}
    else{showToast("PDF não disponível para este cargo")}
  });
  el.addEventListener("mouseenter",e=>showTip(e,n));
  el.addEventListener("mousemove",moveTip);
  el.addEventListener("mouseleave",hideTip);
  canvas.appendChild(el);
  rendered.set(n.id,el);
}

function toggleNode(n){
  if(collapsed.has(n.id))collapsed.delete(n.id);else collapsed.add(n.id);
  refresh();
}

function copyNodeText(n){
  const parts=[n.title];
  if(n.holder)parts.push(n.holder);
  const text=parts.join("\n");
  function fallback(){
    try{
      const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px;opacity:0";
      document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");ta.remove();
    }catch(e){}
    showToast("Texto copiado!");
  }
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>showToast("Texto copiado!")).catch(fallback);
    }else{fallback()}
  }catch(e){fallback()}
}

let toastTimer=0;
function showToast(msg){
  let t=document.querySelector(".toast");
  if(!t){t=document.createElement("div");t.className="toast";document.body.appendChild(t)}
  t.textContent=msg;clearTimeout(toastTimer);
  t.classList.add("show");toastTimer=setTimeout(()=>t.classList.remove("show"),2000);
}

function showTip(e,n){
  tooltip.innerHTML=`<strong>${esc(n.title)}</strong><span>${esc(n.holder||n.kind)}</span>`;
  tooltip.classList.add("show");moveTip(e);
}
function moveTip(e){
  let l=e.clientX+16,t=e.clientY+16;
  const r=tooltip.getBoundingClientRect();
  if(l+r.width>window.innerWidth)l=e.clientX-r.width-16;
  if(t+r.height>window.innerHeight)t=e.clientY-r.height-16;
  tooltip.style.left=l+"px";tooltip.style.top=t+"px";
}
function hideTip(){tooltip.classList.remove("show")}

function addPath(d){
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",d);lineLayer.appendChild(p);
}

function drawLines(){
  lineLayer.replaceChildren();
  const childrenByParent=new Map();
  nodes.forEach(n=>{
    if(!n.parent||!isVisible(n))return;
    const par=byId.get(n.parent);
    if(!par||!isVisible(par))return;
    if(!childrenByParent.has(n.parent))childrenByParent.set(n.parent,[]);
    childrenByParent.get(n.parent).push(n);
  });

  childrenByParent.forEach((children,pid)=>{
    const par=byId.get(pid);
    const pr=rectFor(par);

    if(pid==="del"){
      drawGridLines(pr,children);
      return;
    }

    // Check for horizontal siblings (child top within parent vertical range)
    const below=[];
    const beside=[];
    children.forEach(c=>{
      const cr=rectFor(c);
      if(cr.top<pr.bottom-5) beside.push(c); else below.push(c);
    });

    // Draw horizontal connections
    beside.forEach(c=>{
      const cr=rectFor(c);
      const fromX=cr.cx>pr.cx?pr.x+pr.w:pr.x;
      const toX=cr.cx>pr.cx?cr.x:cr.x+cr.w;
      const midY=(pr.y+pr.h/2+cr.y+cr.h/2)/2;
      addPath(`M ${fromX.toFixed(1)} ${midY.toFixed(1)} H ${toX.toFixed(1)}`);
    });

    // Draw vertical connections using grouped approach
    if(below.length===0)return;
    if(below.length===1){
      const cr=rectFor(below[0]);
      const gap=Math.max(24,cr.top-pr.bottom);
      const hDist=Math.abs(cr.cx-pr.cx);
      const ratio=hDist>50?.85:.5;
      const midY=pr.bottom+gap*ratio;
      addPath(`M ${pr.cx.toFixed(1)} ${pr.bottom.toFixed(1)} V ${midY.toFixed(1)} H ${cr.cx.toFixed(1)} V ${cr.top.toFixed(1)}`);
      return;
    }
    // Group by row (30px tolerance)
    const rows=[];
    below.forEach(c=>{
      const cr=rectFor(c);
      let row=rows.find(r=>Math.abs(r.topY-cr.top)<30);
      if(!row){row={topY:cr.top,nodes:[]};rows.push(row)}
      row.nodes.push({node:c,rect:cr});
    });
    rows.sort((a,b)=>a.topY-b.topY);
    rows.forEach(r=>r.nodes.sort((a,b)=>a.rect.cx-b.rect.cx));

    let trunkX=pr.cx,currentY=pr.bottom;
    rows.forEach(row=>{
      const minTop=Math.min(...row.nodes.map(n=>n.rect.top));
      const gap=Math.max(24,minTop-currentY);
      const barY=currentY+gap*.5;
      addPath(`M ${trunkX.toFixed(1)} ${currentY.toFixed(1)} V ${barY.toFixed(1)}`);
      const leftX=Math.min(trunkX,row.nodes[0].rect.cx);
      const rightX=Math.max(trunkX,row.nodes[row.nodes.length-1].rect.cx);
      if(Math.abs(leftX-rightX)>1)addPath(`M ${leftX.toFixed(1)} ${barY.toFixed(1)} H ${rightX.toFixed(1)}`);
      row.nodes.forEach(({rect})=>{addPath(`M ${rect.cx.toFixed(1)} ${barY.toFixed(1)} V ${rect.top.toFixed(1)}`)});
      currentY=barY;
    });
  });
}

function drawGridLines(pr,children){
  // Group escritórios into rows by Y (200px tolerance in render coords for 2 distinct rows)
  const rows=[];
  children.forEach(c=>{
    const cr=rectFor(c);
    let row=rows.find(r=>Math.abs(r.topY-cr.top)<80);
    if(!row){row={topY:cr.top,nodes:[]};rows.push(row)}
    row.nodes.push({node:c,rect:cr});
  });
  rows.sort((a,b)=>a.topY-b.topY);
  rows.forEach(r=>r.nodes.sort((a,b)=>a.rect.cx-b.rect.cx));

  // Trunk X = parent center (at far left, outside most boxes)
  const trunkX=pr.cx;
  let currentY=pr.bottom;

  rows.forEach(row=>{
    const minTop=Math.min(...row.nodes.map(n=>n.rect.top));
    const gap=Math.max(24,minTop-currentY);
    const barY=minTop-15; // Bar just above the row

    // Trunk segment
    addPath(`M ${trunkX.toFixed(1)} ${currentY.toFixed(1)} V ${barY.toFixed(1)}`);

    // Horizontal bar spanning all nodes in this row
    const leftX=row.nodes[0].rect.cx;
    const rightX=row.nodes[row.nodes.length-1].rect.cx;

    // Connect trunk to bar (if trunk is outside bar range)
    if(trunkX<leftX)addPath(`M ${trunkX.toFixed(1)} ${barY.toFixed(1)} H ${rightX.toFixed(1)}`);
    else if(trunkX>rightX)addPath(`M ${leftX.toFixed(1)} ${barY.toFixed(1)} H ${trunkX.toFixed(1)}`);
    else addPath(`M ${leftX.toFixed(1)} ${barY.toFixed(1)} H ${rightX.toFixed(1)}`);

    // Stubs from bar to each box
    row.nodes.forEach(({rect})=>{addPath(`M ${rect.cx.toFixed(1)} ${barY.toFixed(1)} V ${rect.top.toFixed(1)}`)});

    currentY=barY;
  });
}

function refresh(){
  rendered.forEach((el,id)=>{
    const n=byId.get(id);
    el.classList.toggle("hidden",!isVisible(n));
    const tg=el.querySelector(".node-toggle");
    if(tg)tg.textContent=collapsed.has(id)?"+":"−";
  });
  drawLines();
}

// Render all nodes
nodes.forEach(createNode);

// ===== Zoom & Pan =====
let scale=0.7,panX=0,panY=0;
let isDrag=false,dragSX,dragSY,panSX,panSY;

function applyTransform(){
  canvas.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  const pct=Math.round(scale*100);
  zoomRange.value=String(pct);
  zoomLabel.textContent=pct+"%";
}

function zoomAt(newScale,px,py){
  newScale=Math.max(.2,Math.min(1.5,newScale));
  const ratio=newScale/scale;
  panX=px-ratio*(px-panX);
  panY=py-ratio*(py-panY);
  scale=newScale;
  applyTransform();
}
function zoomCenter(ns){
  const vr=viewport.getBoundingClientRect();
  zoomAt(ns,vr.width/2,vr.height/2);
}

function fitToScreen(){
  const vr=viewport.getBoundingClientRect();
  const sx=(vr.width-48)/RW,sy=(vr.height-48)/RH;
  scale=Math.max(.2,Math.min(1,Math.min(sx,sy)));
  panX=(vr.width-RW*scale)/2;
  panY=(vr.height-RH*scale)/2;
  applyTransform();
}

viewport.addEventListener("wheel",e=>{
  e.preventDefault();
  const vr=viewport.getBoundingClientRect();
  zoomAt(scale+(e.deltaY<0?.05:-.05),e.clientX-vr.left,e.clientY-vr.top);
},{passive:false});

viewport.addEventListener("mousedown",e=>{
  if(e.target.closest(".org-node"))return;
  isDrag=true;dragSX=e.clientX;dragSY=e.clientY;panSX=panX;panSY=panY;
  viewport.classList.add("dragging");e.preventDefault();
});
window.addEventListener("mousemove",e=>{if(!isDrag)return;panX=panSX+(e.clientX-dragSX);panY=panSY+(e.clientY-dragSY);applyTransform()});
window.addEventListener("mouseup",()=>{isDrag=false;viewport.classList.remove("dragging")});

// Touch
let lastDist=0,lastCenter=null;
viewport.addEventListener("touchstart",e=>{
  if(e.target.closest(".org-node"))return;
  if(e.touches.length===1){isDrag=true;dragSX=e.touches[0].clientX;dragSY=e.touches[0].clientY;panSX=panX;panSY=panY}
  else if(e.touches.length===2){isDrag=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastDist=Math.sqrt(dx*dx+dy*dy);const vr=viewport.getBoundingClientRect();lastCenter={x:(e.touches[0].clientX+e.touches[1].clientX)/2-vr.left,y:(e.touches[0].clientY+e.touches[1].clientY)/2-vr.top}}
  e.preventDefault();
},{passive:false});
viewport.addEventListener("touchmove",e=>{
  if(e.touches.length===1&&isDrag){panX=panSX+(e.touches[0].clientX-dragSX);panY=panSY+(e.touches[0].clientY-dragSY);applyTransform()}
  else if(e.touches.length===2&&lastDist>0&&lastCenter){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);zoomAt(scale*(dist/lastDist),lastCenter.x,lastCenter.y);lastDist=dist;const vr=viewport.getBoundingClientRect();lastCenter={x:(e.touches[0].clientX+e.touches[1].clientX)/2-vr.left,y:(e.touches[0].clientY+e.touches[1].clientY)/2-vr.top}}
  e.preventDefault();
},{passive:false});
viewport.addEventListener("touchend",()=>{isDrag=false;lastDist=0;lastCenter=null});

// Toolbar
document.getElementById("btnZoomIn").addEventListener("click",()=>zoomCenter(scale+.05));
document.getElementById("btnZoomOut").addEventListener("click",()=>zoomCenter(scale-.05));
zoomRange.addEventListener("input",()=>{zoomCenter(Number(zoomRange.value)/100)});
document.getElementById("btnFit").addEventListener("click",fitToScreen);
document.getElementById("btnExpand").addEventListener("click",()=>{collapsed.clear();refresh()});
document.getElementById("btnCollapse").addEventListener("click",()=>{
  nodes.forEach(n=>{if(n.id!=="sec"&&n.children.length>0)collapsed.add(n.id)});
  refresh();
});

// Init: fully expanded, fit to screen
drawLines();
setTimeout(fitToScreen,60);

// ===== Download =====
function captureCanvas(){
  return new Promise(resolve=>{
    const prevTransform=canvas.style.transform;
    const prevOverflow=canvas.style.overflow;
    const wasCollapsed=[...collapsed];
    collapsed.clear();refresh();
    canvas.style.transform="none";
    canvas.style.overflow="visible";
    setTimeout(()=>{
      html2canvas(canvas,{scale:2,useCORS:true,backgroundColor:"#ffffff",width:RW,height:RH,windowWidth:RW,windowHeight:RH}).then(c=>{
        canvas.style.transform=prevTransform;
        canvas.style.overflow=prevOverflow;
        wasCollapsed.forEach(id=>collapsed.add(id));refresh();
        resolve(c);
      });
    },100);
  });
}

function downloadLink(url,name){
  const a=document.createElement("a");a.href=url;a.download=name;
  document.body.appendChild(a);a.click();a.remove();
}

document.getElementById("btnJPG").addEventListener("click",()=>{
  const btn=document.getElementById("btnJPG");
  btn.disabled=true;btn.textContent="Gerando...";
  captureCanvas().then(c=>{
    downloadLink(c.toDataURL("image/jpeg",0.95),"Organograma_SEAGRI_2026.jpg");
    btn.disabled=false;btn.innerHTML="&#128247; JPG";
  });
});

document.getElementById("btnPDF").addEventListener("click",()=>{
  const btn=document.getElementById("btnPDF");
  btn.disabled=true;btn.textContent="Gerando...";
  captureCanvas().then(c=>{
    const imgData=c.toDataURL("image/jpeg",0.95);
    const pdf=new jspdf.jsPDF({orientation:"landscape",unit:"px",format:[RW,RH]});
    pdf.addImage(imgData,"JPEG",0,0,RW,RH);
    pdf.save("Organograma_SEAGRI_2026.pdf");
    btn.disabled=false;btn.innerHTML="&#128196; PDF";
  });
});
</script>
