<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEAGRI - Secretaria de Estado de Agricultura</title>
<style>
  :root{
    --verde:#1b5e20; --verde2:#2e7d32; --verde-claro:#e8f5e9; --linha:#e0e0e0;
    --texto:#212121; --sombra:0 2px 8px rgba(27,94,32,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Roboto","Segoe UI",Arial,sans-serif;background:#fafafa;color:var(--texto);min-height:100vh;display:flex;flex-direction:column;}
  header{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;padding:40px 32px;text-align:center;box-shadow:0 4px 12px rgba(27,94,32,0.2);}
  header h1{font-size:28px;font-weight:500;margin:0 0 8px;}
  header p{font-size:14px;opacity:.9;margin:0;}
  .container{flex:1;display:flex;justify-content:center;align-items:center;padding:40px 24px;}
  .cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:1180px;}
  .card-link{text-decoration:none;color:inherit;display:block;flex:1;min-width:240px;max-width:320px;}
  .card{background:#fff;border-radius:16px;padding:40px 32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:2px solid transparent;transition:all .3s ease;}
  .card:hover{transform:translateY(-6px);box-shadow:0 8px 32px rgba(27,94,32,0.15);border-color:var(--verde2);}
  .card-icon{font-size:48px;margin-bottom:16px;display:block;}
  .card h2{font-size:22px;font-weight:600;color:var(--verde);margin:0 0 12px;}
  .card p{font-size:14px;color:#666;line-height:1.6;margin:0;}
  .card .badge{display:inline-block;margin-top:16px;padding:8px 20px;background:var(--verde);color:#fff;border-radius:8px;font-size:13px;font-weight:600;transition:background .2s;}
  .card:hover .badge{background:var(--verde2);}
  footer{padding:20px 32px;font-size:12px;color:#999;text-align:center;border-top:1px solid var(--linha);}
  @media(max-width:600px){
    header{padding:28px 16px;}
    header h1{font-size:22px;}
    .container{padding:24px 16px;}
    .cards{gap:20px;}
    .card{padding:28px 20px;}
    .card h2{font-size:18px;}
  }
</style>
</head>
<body>
<header>
  <h1>Sistema de Apoio Interno</h1>
  <p>Secretaria de Agricultura do Acre</p>
</header>

<div class="container">
  <div class="cards">
    <a href="portarias.html" class="card-link">
      <div class="card">
        <span class="card-icon">&#128203;</span>
        <h2>Portarias</h2>
        <p>Portarias de nomeação</p>
        
      </div>
    </a>
    <a href="organograma.html" class="card-link">
      <div class="card">
        <span class="card-icon">&#127963;</span>
        <h2>Organograma</h2>
        <p>Estrutura organizacional</p>
        
      </div>
    </a>
    <a href="chamados.html" class="card-link">
      <div class="card">
        <span class="card-icon">&#128187;</span>
        <h2>Chamados</h2>
        <p>Sistema de Chamados</p>
        
      </div>
    </a>
    <a href="https://datastudio.google.com/reporting/2b0d6260-ce84-4061-944b-954971732248/page/5xLlD" class="card-link">
      <div class="card">
        <span class="card-icon">&#128202;</span>
        <h2>Dashboards</h2>
        <p>Painéis de dados</p>
      </div>
    </a>
  </div>
</div>

<footer>Secretaria de Estado de Agricultura &ndash; SEAGRI / Acre &middot; P&aacute;gina de apoio interno</footer>
</body>
</html>
