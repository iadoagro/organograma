<header>
  <a class="voltar" href="index.html">&#8592; Menu</a>
  <h1>&#128222; Contatos dos Servidores</h1>
  <span class="header-stats" id="statsLabel"></span>
</header>
<div class="controles">
  <input class="busca" id="busca" type="search" placeholder="Buscar por nome ou setor...">
  <div class="filtros">
    <button class="filtro-btn ativo" data-grupo="">Todos</button>
    <button class="filtro-btn" data-grupo="Secretaria">Secretaria</button>
    <button class="filtro-btn" data-grupo="DAF">DAF</button>
    <button class="filtro-btn" data-grupo="DPA">DPA</button>
    <button class="filtro-btn" data-grupo="DPTEC">DPTEC</button>
    <button class="filtro-btn" data-grupo="Escritórios Locais">Escritórios</button>
  </div>

<main id="main"></main>

<div class="qr-modal-backdrop" id="qrBackdrop">
  <div class="qr-modal">
    <div class="qr-modal-nome" id="qrNome"></div>
    <div class="qr-modal-setor" id="qrSetor"></div>
    <div class="qr-modal-canvas" id="qrCanvas"></div>
    <div class="qr-modal-hint">Aponte a câmera para abrir o WhatsApp</div>
    <button class="qr-modal-close" id="qrClose">Fechar</button>
  </div>
</div>

<script>
const LS_KEY='seagri_contatos';
const API_SAVE='../salvar_contatos.php';
const API_READ='../data/contatos.json';
const PENCIL_ICON='<svg viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>';

function loadLocal(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch(e){return{}}}
function mirrorLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(contatos))}catch(e){}}

// Salva via PHP (só funciona em servidor local com XAMPP)
function salvarServidor(id,tel){
  return fetch(API_SAVE,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:id,telefone:tel})
  }).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}

// QR Code
const qrBackdrop=document.getElementById('qrBackdrop');
document.getElementById('qrClose').addEventListener('click',()=>qrBackdrop.classList.remove('show'));
qrBackdrop.addEventListener('click',e=>{if(e.target===qrBackdrop)qrBackdrop.classList.remove('show');});

function showQR(p,tel){
  const waUrl=formatWA(tel);
  if(!waUrl)return;
  document.getElementById('qrNome').textContent=p.nome;
  document.getElementById('qrSetor').textContent=p.setor;
  const canvas=document.getElementById('qrCanvas');
  canvas.innerHTML='';
  const qr=qrcode(0,'M');
  qr.addData(waUrl);
  qr.make();
  const img=document.createElement('div');
  img.innerHTML=qr.createSvgTag({cellSize:5,margin:2});
  img.firstChild.style.borderRadius='8px';
  canvas.appendChild(img);
  qrBackdrop.classList.add('show');
}

function formatWA(tel){
  const d=tel.replace(/\D/g,'');
  if(!d)return null;
  return'https://wa.me/'+(d.startsWith('55')&&d.length>=12?d:'55'+d);
}

function formatDisplay(tel){
  const d=tel.replace(/\D/g,'');
  if(d.length===11)return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  if(d.length===10)return`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return tel;
}

let grupoAtivo='',buscaAtiva='';
let contatos=loadLocal();

function atualizarStats(){
  const preenchidos=Object.keys(contatos).filter(k=>contatos[k]).length;
  document.getElementById('statsLabel').textContent=preenchidos+' de '+SEAGRI_PESSOAS.length+' com telefone';
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;clearTimeout(toastTimer);
  t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

function renderCard(p){
  const card=document.createElement('div');
  card.className='card-contato';
  card.dataset.id=p.id;
  card.dataset.nome=p.nome.toLowerCase();
  card.dataset.setor=p.setor.toLowerCase();
  card.dataset.grupo=p.grupo;

  const nome=document.createElement('div');nome.className='card-nome';nome.textContent=p.nome;
  const setor=document.createElement('div');setor.className='card-setor';setor.textContent=p.setor;

  const campo=document.createElement('div');campo.className='campo-tel';
  const inp=document.createElement('input');
  inp.type='tel';inp.className='input-tel';inp.placeholder='(68) 9XXXX-XXXX';

  const btnSalvar=document.createElement('button');
  btnSalvar.type='button';btnSalvar.className='btn-salvar';btnSalvar.textContent='Salvar';

  const btnEditar=document.createElement('button');
  btnEditar.type='button';btnEditar.className='btn-editar';btnEditar.title='Editar';
  btnEditar.setAttribute('aria-label','Editar');btnEditar.innerHTML=PENCIL_ICON;

  const wa=document.createElement('a');
  wa.className='btn-wa';wa.textContent='WhatsApp';wa.target='_blank';wa.rel='noopener';

  const btnQR=document.createElement('button');
  btnQR.type='button';btnQR.className='btn-qr';btnQR.title='Gerar QR Code';
  btnQR.textContent='⬛';btnQR.classList.add('oculto');

  // Modo VISUALIZAÇÃO: input travado, mostra lápis + WhatsApp (se houver número)
  function modoVisual(){
    const tel=contatos[p.id]||'';
    inp.value=tel?formatDisplay(tel):'';
    inp.disabled=true;inp.classList.add('locked');
    inp.classList.toggle('salvo',!!tel);
    btnSalvar.classList.add('oculto');
    if(tel){
      btnEditar.classList.remove('oculto');
      wa.href=formatWA(tel);wa.classList.remove('oculto');
      btnQR.classList.remove('oculto');
    }else{
      btnQR.classList.add('oculto');
      modoEdicao(false);
    }
  }

  function modoEdicao(foco){
    inp.disabled=false;inp.classList.remove('locked');
    btnSalvar.classList.remove('oculto');
    btnEditar.classList.add('oculto');
    wa.classList.add('oculto');
    btnQR.classList.add('oculto');
    if(foco)setTimeout(()=>inp.focus(),0);
  }

  btnQR.addEventListener('click',()=>{const tel=contatos[p.id]||'';if(tel)showQR(p,tel);});

  btnEditar.addEventListener('click',()=>modoEdicao(true));

  function salvar(){
    const v=inp.value.trim();
    const digitos=v?v.replace(/\D/g,''):'';
    btnSalvar.disabled=true;btnSalvar.textContent='Salvando...';
    salvarServidor(p.id,digitos).then(res=>{
      if(res&&res.ok){
        if(digitos)contatos[p.id]=digitos;else delete contatos[p.id];
        mirrorLocal();atualizarStats();
        showToast(digitos?'Telefone salvo!':'Telefone removido');
        modoVisual();
      }else{
        showToast('Erro ao salvar: '+((res&&res.erro)||'tente novamente'));
      }
    }).catch(()=>{
      // PHP indisponível (ex: GitHub Pages) — salva apenas localmente
      if(digitos)contatos[p.id]=digitos;else delete contatos[p.id];
      mirrorLocal();atualizarStats();
      showToast(digitos?'Salvo localmente (sem servidor)':'Removido localmente');
      modoVisual();
    }).finally(()=>{
      btnSalvar.disabled=false;btnSalvar.textContent='Salvar';
    });
  }

  btnSalvar.addEventListener('click',salvar);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();salvar();}});

  campo.appendChild(inp);campo.appendChild(btnSalvar);campo.appendChild(btnEditar);campo.appendChild(wa);campo.appendChild(btnQR);
  card.appendChild(nome);card.appendChild(setor);card.appendChild(campo);

  // Estado inicial conforme já exista telefone salvo
  if(contatos[p.id])modoVisual();else modoEdicao(false);
  return card;
}

// Hierarquia igual ao organograma: diretoria › departamento › divisão › núcleo
const KIND_ORDER=['secretaria','secretaria-adjunta','assessoria','diretoria','departamento','divisao','nucleo','escritorio'];
const KIND_LABEL={
  'secretaria':'Secretaria',
  'secretaria-adjunta':'Secretaria Adjunta',
  'assessoria':'Assessorias',
  'diretoria':'Diretoria',
  'departamento':'Departamentos',
  'divisao':'Divisões',
  'nucleo':'Núcleos',
  'escritorio':'Escritórios Locais'
};

function render(){
  const main=document.getElementById('main');
  main.innerHTML='';
  const q=buscaAtiva.toLowerCase().trim();
  const grupos=['Secretaria','DAF','DPA','DPTEC','Escritórios Locais'];
  const gruposNomes={'Escritórios Locais':'Escritórios'};
  let totalVisiveis=0;

  grupos.forEach(g=>{
    if(grupoAtivo&&grupoAtivo!==g)return;
    const lista=SEAGRI_PESSOAS.filter(p=>{
      if(p.grupo!==g)return false;
      if(q&&!p.nome.toLowerCase().includes(q)&&!p.setor.toLowerCase().includes(q))return false;
      return true;
    });
    if(!lista.length)return;
    totalVisiveis+=lista.length;

    const secao=document.createElement('div');secao.className='grupo-secao';
    const titulo=document.createElement('div');
    const cls=g==='Escritórios Locais'?'Escritórios':g;
    titulo.className='grupo-titulo '+cls;
    titulo.textContent=(gruposNomes[g]||g)+' ('+lista.length+')';
    secao.appendChild(titulo);

    // Separa por tipo (diretoria/departamento/divisão/núcleo), como no organograma
    KIND_ORDER.forEach(kind=>{
      const doTipo=lista.filter(p=>p.kind===kind);
      if(!doTipo.length)return;
      // Só mostra o rótulo do tipo quando o grupo tem mais de um tipo
      const tiposNoGrupo=new Set(lista.map(p=>p.kind));
      if(tiposNoGrupo.size>1){
        const sub=document.createElement('div');sub.className='subgrupo-titulo';
        sub.textContent=(KIND_LABEL[kind]||kind)+' ('+doTipo.length+')';
        secao.appendChild(sub);
      }
      const grid=document.createElement('div');grid.className='cards-grid';
      doTipo.forEach(p=>grid.appendChild(renderCard(p)));
      secao.appendChild(grid);
    });

    main.appendChild(secao);
  });

  if(!totalVisiveis){
    const s=document.createElement('div');s.className='sem-resultado';
    s.textContent='Nenhuma pessoa encontrada.';main.appendChild(s);
  }
  atualizarStats();
}

document.getElementById('busca').addEventListener('input',e=>{buscaAtiva=e.target.value;render()});

document.querySelectorAll('.filtro-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('ativo'));
    btn.classList.add('ativo');
    grupoAtivo=btn.dataset.grupo;
    render();
  });
});

// Carrega telefones do contatos.json (funciona em GH Pages e local)
render();
fetch(API_READ,{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{
  if(d&&typeof d==='object'&&Object.keys(d).length>0){
    contatos=d;mirrorLocal();render();
  }
}).catch(()=>{/* mantém dados do localStorage */});
</script>
